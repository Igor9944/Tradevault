<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeVault — Connexion Espace de Trading</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&amp;family=Space+Mono:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS SDK CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            syne: ['Syne', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: '#00FF9C',
            accent: '#00D1FF',
            darkBg: '#020617',
            navyCard: 'rgba(15, 23, 42, 0.4)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #020617;
      color: #94a3b8;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 255, 156, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 209, 255, 0.03) 0%, transparent 40%),
        linear-gradient(rgba(15, 23, 42, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.3) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
    }
    .neon-border {
      box-shadow: 0 0 20px rgba(0, 255, 156, 0.05);
      border: 1px solid rgba(0, 255, 156, 0.1);
    }
    .loader {
      border: 2px solid rgba(0, 255, 156, 0.1);
      border-top: 2px solid #00FF9C;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased">

  <div class="w-full max-w-md my-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-white/5 border border-white/10 rounded-full mb-3 text-[10px] tracking-widest font-mono font-bold text-slate-400">
        <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
        TRADEVAULT TRADER PORTAL
      </div>
      <h1 class="text-3xl font-extrabold font-syne text-white tracking-tight mb-2">
        ACCÈS PORTAL
      </h1>
      <p class="text-slate-400 text-sm max-w-xs mx-auto font-sans">
        Connectez-vous à votre espace personnel sécurisé TradeVault.
      </p>
    </div>

    <!-- Main Card -->
    <div class="bg-slate-900/45 border border-slate-800/80 rounded-2xl p-6 md:p-8 backdrop-blur-xl shadow-2xl relative">
      <form id="login-form" class="space-y-6">

        <!-- Email -->
        <div>
          <label class="block text-[10px] font-mono font-bold tracking-widest text-[#00D1FF] uppercase mb-2">ADRESSE E-MAIL</label>
          <div class="relative rounded-xl border border-slate-800 bg-slate-950/80 transition-all focus-within:border-primary/50">
            <input type="email" id="email" required placeholder="trader@gmail.com"
              class="w-full bg-transparent px-4 py-3.5 text-sm text-white font-sans placeholder-slate-600 focus:outline-none">
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="block text-[10px] font-mono font-bold tracking-widest text-[#00D1FF] uppercase">MOT DE PASSE</label>
            <a href="#" onclick="alert('Veuillez contacter le support TradeVault pour réinitialiser vos secrets.')" class="text-[9px] font-mono text-primary hover:underline uppercase">Oublié ?</a>
          </div>
          <div class="relative rounded-xl border border-slate-800 bg-slate-950/80 transition-all focus-within:border-primary/50">
            <input type="password" id="password" required placeholder="Saisir votre mot de passe"
              class="w-full bg-transparent px-4 py-3.5 text-sm text-white font-sans placeholder-slate-600 focus:outline-none">
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="btn-submit"
          class="w-full py-4 bg-white text-black hover:bg-primary font-mono font-bold tracking-widest text-[10px] rounded-xl flex items-center justify-center gap-2 transition-all shadow-md active:scale-95 cursor-pointer uppercase">
          IDENTIFIER MON COMPTE <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>

        <!-- Divider -->
        <div class="relative flex items-center justify-center">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
          <span class="relative bg-[#080d19] px-3 text-[10px] font-mono text-slate-500 font-bold uppercase tracking-widest">OU</span>
        </div>

        <!-- Google OAuth Button -->
        <button type="button" id="btn-google" onclick="connectGoogle()"
          class="w-full py-3.5 px-4 bg-white/5 hover:bg-white/10 text-white rounded-xl text-[9px] font-mono font-bold tracking-widest uppercase border border-white/5 hover:border-primary/30 flex items-center justify-center gap-2.5 transition-all cursor-pointer group">
          <svg class="w-4 h-4 transition-transform group-hover:scale-110" viewBox="0 0 24 24" focusable="false">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
          SE CONNECTER AVEC GOOGLE
        </button>

        <div class="text-center pt-2">
          <p class="text-xs text-slate-500 font-sans">
            Nouveau trader ? <a href="register.html" class="text-primary hover:underline font-medium">Devenir Trader Premium</a>
          </p>
        </div>

      </form>
    </div>
  </div>

  <script>
    // Initialize Supabase client
    const finalUrl = 'https://bbolxwrtunedstpazykr.supabase.co';
    let supabase;
    try {
      const storedUrl = localStorage.getItem('supabase_url') || finalUrl;
      supabase = supabase.createClient(
        import.meta?.env?.VITE_SUPABASE_URL || storedUrl || finalUrl, 
        import.meta?.env?.VITE_SUPABASE_ANON_KEY || localStorage.getItem('supabase_anon_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'
      );
    } catch (e) {
      console.warn("Supabase init fallback:", e);
    }

    // Google connection
    async function connectGoogle() {
      try {
        await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/login.html'
          }
        });
      } catch (err) {
        alert("Une erreur s'est produite avec Google : " + err.message);
      }
    }

    // Checking status onAuthStateChange
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session && session.user) {
        const userId = session.user.id;
        const userEmail = session.user.email;
        
        // Show load overlay
        const btnSubmit = document.getElementById('btn-submit');
        if (btnSubmit) {
          btnSubmit.disabled = true;
          btnSubmit.innerHTML = `<div class="loader"></div> VÉRIFICATION DE VOTRE COMPTE...`;
        }

        try {
          let traderStatus = null;
          
          // Check users table
          const { data: uData } = await supabase.from('users').select('*').eq('id', userId).maybeSingle();
          if (uData) {
            traderStatus = uData.status;
          } else {
            // Check profiles table
            const { data: pData } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle();
            if (pData) {
              traderStatus = pData.status;
            }
          }

          // If no trader status can be fetched, it means they logged in with Google but never registered or linked their account.
          if (!traderStatus) {
            alert("Compte introuvable. Veuillez d'abord vous inscrire avec votre adresse e-mail, attendre la validation de votre dossier, puis lier votre compte Google depuis vos paramètres de profil.");
            await supabase.auth.signOut();
            window.location.reload();
            return;
          }

          if (traderStatus === 'pending') {
            alert("Votre compte est en attente de validation admin. Un email de confirmation a été envoyé.");
            await supabase.auth.signOut();
            window.location.reload();
            return;
          }

          if (traderStatus === 'rejected') {
            alert("Votre dossier a été rejeté par l'équipe administrative de TradeVault.");
            await supabase.auth.signOut();
            window.location.reload();
            return;
          }

          // If active/approved, redirect to the primary app page
          if (traderStatus === 'active' || traderStatus === 'approved') {
            // Write session user to sync React's layout
            sessionStorage.setItem('tv_current_user', JSON.stringify({
              id: userId,
              email: userEmail,
              status: 'approved',
              paid: true
            }));
            window.location.href = 'index.html';
          }
        } catch (e) {
          console.error("Status audit issue :", e);
          alert("Erreur de synchronisation du compte.");
          await supabase.auth.signOut();
          window.location.reload();
        }
      }
    });

    // Form manual email/password connection
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btnSubmit = document.getElementById('btn-submit');

      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<div class="loader"></div> RETOUR DE SUPABASE...`;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          throw new Error(error.message);
        }
        // Connection checks are automatically executed in onAuthStateChange callback.
      } catch (err) {
        alert('Erreur de connexion : ' + (err.message || 'Identifiants invalides'));
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `IDENTIFIER MON COMPTE`;
      }
    });
  </script>
</body>
</html>

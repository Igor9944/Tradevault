# .github/workflows/deploy.yml — TradeVault v3.2
# Quality checks only — Vercel native GitHub integration gère le deploy

name: TradeVault CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint + Type + Build ───────────────────────────────────────────────────────
  quality:
    name: Lint + Type + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ── Security (non-bloquant) ───────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Check hardcoded secrets
        run: |
          FOUND=$(grep -rn "eyJhbGci\|service_role" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            | grep -v "placeholder\|dummy\|dummyKey\|dummyUrl" \
            | grep -v "import\.meta\.env\|process\.env\|VITE_\|\/\/" \
            || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Hardcoded secret:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No hardcoded secrets"
name: TradeVault CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Lint + Type + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint --if-present
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          FOUND=$(grep -rn "eyJhbGci\|service_role" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            | grep -v "placeholder\|dummy\|dummyKey\|dummyUrl" \
            | grep -v "import\.meta\.env\|process\.env\|VITE_\|\/\/" \
            || true)

          if [ -n "$FOUND" ]; then
            echo "❌ Hardcoded secret detected:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check env vars not exposed in client bundle
        run: |
          BUILD_OUTPUT=$(find dist -name "*.js" 2>/dev/null | head -5)
          if [ -n "$BUILD_OUTPUT" ]; then
            if grep -l "service_role\|SUPABASE_SERVICE_ROLE" $BUILD_OUTPUT 2>/dev/null; then
              echo "❌ SERVICE_ROLE_KEY exposed in client bundle!"
              exit 1
            fi
            echo "✅ No service keys in client bundle"
          fi

  preview:
    name: Deploy Preview
    needs: [quality]
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"

  production:
    name: Deploy Production
    needs: [quality, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://tradevault-silk.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Verify deployment
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://tradevault-silk.vercel.app/api/supabase/proxy)
          echo "Proxy status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Deployment verified" || echo "⚠️ Got $STATUS"

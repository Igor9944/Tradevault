name: TradeVault CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint + Type + Build ───────────────────────────────────────────────────────
  quality:
    name: Lint + Type + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint --if-present
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ── Security (non-bloquant pour deploy) ──────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true          # ← ne bloque plus le deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Check hardcoded secrets
        run: |
          FOUND=$(grep -rn "eyJhbGci\|service_role" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            | grep -v "placeholder\|dummy\|dummyKey\|dummyUrl" \
            | grep -v "import\.meta\.env\|process\.env\|VITE_\|\/\/" \
            || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Hardcoded secret:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No hardcoded secrets"

  # ── Deploy Preview (develop / PRs) ───────────────────────────────────────────
  preview:
    name: Deploy Preview
    needs: [quality]                 # ← dépend uniquement de quality
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

  # ── Deploy Production (main only) ────────────────────────────────────────────
  production:
    name: Deploy Production
    needs: [quality]                 # ← dépend uniquement de quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://tradevault-silk.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://tradevault-silk.vercel.app/api/supabase/proxy)
          echo "Proxy: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ OK" || echo "⚠️ Got $STATUS"

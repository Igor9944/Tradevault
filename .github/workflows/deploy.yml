# .github/workflows/deploy.yml
# v3.2b — 2025-07-13
# CI uniquement — Vercel déploie via son intégration GitHub native

name: CI — TradeVault

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck
        # Bloquant — si tsc échoue, le CI s'arrête

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        # Bloquant — si le build échoue, le CI s'arrête

      - name: Security audit
        run: npm audit --audit-level=high || true
        # Non-bloquant — affiche les vulnérabilités sans bloquer le déploiement

      - name: Build size report
        run: |
          echo "=== Build output size ==="
          du -sh dist/ 2>/dev/null || echo "dist/ not found"
          ls -lh dist/assets/*.js 2>/dev/null | head -10 || true
        # Informatif seulement
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TradeLog PRO – Tableau de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg-main:#060a0f;
  --bg-panel:#0a0f1a;
  --accent:#00e5ff;
  --success:#00e676;
  --error:#ff3d57;
  --info:#8b5cf6;
  --text:#e0e0e0;
  --muted:#9ca3af;
  --border:rgba(0,229,255,0.1);
  --radius:8px;
  --transition:0.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Space Mono',monospace;background:var(--bg-main);color:var(--text);}
body{display:flex;overflow:hidden}

/* Sidebar */
aside{
  width:260px;
  background:var(--bg-panel);
  padding:1.5rem 1rem;
  overflow-y:auto;
  position:fixed;top:0;left:0;bottom:0;
  border-right:1px solid var(--border);
}
aside h1{font-family:'Syne',sans-serif;font-size:1.5rem;margin-bottom:1.5rem;color:var(--accent);text-align:center}
aside nav{display:flex;flex-direction:column;gap:0.5rem}
aside nav button{
  background:none;border:none;text-align:left;width:100%;padding:0.75rem 1rem;border-radius:border-radius:var(--radius);
  font-family:'Syne',sans-serif;font-size:1rem;color:var(--text);cursor:pointer;
  display:flex;align-items:center;gap:0.75rem;
  transition:var(--transition);
}
aside nav button.active,
aside nav button:hover{
  background:rgba(0,229,255,0.15);color:var(--accent);
}
aside nav button .icon{font-size:1.25rem}

/* Account selector */
#account-selector{position:relative;margin-top:1.5rem;}
#account-selector button{
  width:100%;text-align:left;padding:0.75rem 1rem;border:none;background:rgba(0,229,255,0.1);
  border-radius:var(--radius);color:var(--text);font-family:'Syne',sans-serif;font-size:1rem;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
}
#account-selector button:hover{background:rgba(0,229,255,0.2);}
#account-selector .dropdown{
  position:absolute;top:100%;left:0;right:0;background:var(--bg-panel);
  border-top:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);
  margin-top:0.25rem;overflow:hidden;max-height:0;transition:max-height .2s ease;
  z-index:10;
}
#account-selector .dropdown.open{max-height:200px;}
#account-selector .dropdown label{
  display:flex;align-items:center;padding:0.5rem 1rem;cursor:pointer;color:var(--text);
}
#account-selector .dropdown label:hover{background:rgba(0,229,255,0.1);}
#account-selector .dropdown input{margin-right:0.5rem;}
/* Add account button */
#add-account-btn{
  width:100%;margin-top:1rem;padding:0.75rem;border:none;background:var(--accent);color:#060a0f;
  border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:1rem;cursor:pointer;
  transition:background .2s;
}
#add-account-btn:hover{background:#00b8e6;}

/* Main area */
main{
  flex:1;margin-left:260px;padding:2rem;overflow-y:auto;
}
header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;
}
header h2{font-family:'Syne',sans-serif;font-size:1.8rem;color:var(--accent);}
#banner{
  position:relative;width:100%;padding:1rem;border-radius:var(--radius);margin-bottom:1.5rem;
  display:none;align-items:center;gap:1rem;font-size:0.95rem;
}
#banner.orange{background:#ff950022;color:#ffb74d;border-left:4px solid #ff9500;}
#banner.red{background:#ff3d5722;color:#ff6b6b;border-left:4px solid #ff3d57;}
#banner .close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:inherit;margin-left:auto;}
.page{display:none;animation:fadeIn .3s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;text-align:center;
}
.stat-card h3{font-family:'Syne',sans-serif;font-size:1rem;margin-bottom:0.5rem;color:var(--muted);}
.stat-card .value{font-size:1.8rem;font-weight:600;}
.stat-card .value.up{color:var(--success);}
.stat-card .value.down{color:var(--error);}
#chart-container{height:300px;margin-bottom:2rem;}
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
.trade-card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;position:relative;
}
.trade-card .date{font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;}
.trade-card .asset{font-weight:600;font-size:1.1rem;margin-bottom:0.3rem;}
.trade-card .type{
  display:inline-block;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.85rem;margin-bottom:0.5rem;
}
.type.buy{background:#00e5ff22;color:#00e5ff;}
.type.sell{background:#ff3d5722;color:#ff3d57;}
.trade-card .pnl{font-size:1.3rem;font-weight:600;margin-bottom:0.5rem;}
.pnl.plus{color:var(--success);}
.pnl.minus{color:var(--error);}
.trade-card img{max-width:100%;border-radius:4px;margin-top:0.5rem;cursor:pointer;}
.trade-card .actions{position:absolute;top:0.5rem;right:0.5rem;}
.trade-card .actions button{background:none;border:none;color:var(--muted);font-size:1.2rem;margin-left:0.5rem;cursor:pointer;}
.trade-card .actions button:hover{color:var(--text);}
#calendar{width:100%;border-collapse:collapse;margin-top:1rem;}
#calendar th,#calendar td{
  border:1px solid var(--border);padding:0.75rem;text-align:center;vertical-align:top;min-height:80px;position:relative;
}
#calendar th{background:var(--bg-panel);color:var(--accent);}
.day{position:relative;padding-top:0.25rem;}
.day.positive{background:#00e67622;}
.day.negative{background:#ff3d5722;}
.day .label{font-size:0.75rem;color:var(--muted);}
.day .value{font-weight:600;font-size:1rem;margin-top:0.25rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;margin-bottom:0.3rem;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:var(--radius);
  background:transparent;color:var(--text);font-family:'Space Mono',monospace;
}
.form-group input[type="file"]{padding:0;}
.form-group button{margin-top:0.5rem;}
.btn{padding:0.5rem 1rem;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Syne',sans-serif;}
.btn-primary{background:var(--accent);color:#060a0f;}
.btn-primary:hover{background:#00b8e6;}
.btn-secondary{background:var(--bg-panel);color:var(--text);}
.btn-secondary:hover{background:rgba(0,229,255,0.1);}
.btn-danger{background:var(--error);color:#fff;}
.btn-danger:hover{background:#e6004a;}
.btn-success{background:var(--success);color:#060a0f;}
.btn-success:hover{background:#00b84d;}
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);
  display:none;align-items:center;justify-content:center;z-index:1000;
}
.modal{
  background:var(--bg-panel);border-radius:var(--radius);width:90%;max-width:500px;
  max-height:80vh;overflow-y:auto;padding:1.5rem;
}
.modal h2{font-family:'Syne',sans-serif;margin-top:0;margin-bottom:1.5rem;color:var(--accent);}
.modal .close-btn{position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;font-size:1.5rem;color:var(--muted);cursor:pointer;}
.modal .close-btn:hover{color:var(--text);}
.modal-footer{margin-top:1.5rem;display:flex;justify-content:flex-end;gap:0.5rem;}
#toast-container{
  position:fixed;bottom:1.5rem;right:1.5rem;display:flex;flex-direction:column;gap:0.5rem;z-index:1000;
}
.toast{
  min-width:250px;padding:0.75rem 1rem;border-radius:var(--radius);color:#fff;font-size:0.9rem;
  display:flex;align-items:center;gap:0.5rem;animation:slideIn .3s ease;
}
.toast.info{background:var(--info);}
.toast.success{background:var(--success);}
.toast.error{background:var(--error);}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity=1;transform:translateX(0)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@media(max-width:768px){
  aside{width:60px;overflow:hidden;transition:width .2s;}
  aside:hover{width:260px;}
  aside h1,aside nav button span{display:none;}
  aside nav button{justify-content:center;}
  aside #account-selector,aside #add-account-btn{display:none;}
  main{margin-left:60px;}
  main:hover aside{width:260px;}
}
</style>
</head>
<body>
<aside>
  <h1>TradeLog PRO</h1>
  <nav>
    <button data-page="dashboard" class="nav-btn"><span class="icon">📊</span><span>Dashboard</span></button>
    <button data-page="journal"   class="nav-btn"><span class="icon">📓</span><span>Journal</span></button>
    <button data-page="calendar"  class="nav-btn"><span class="icon">📅</span><span>Calendrier</span></button>
    <button data-page="newtrade"  class="nav-btn"><span class="icon">➕</span><span>Nouveau Trade</span></button>
    <button data-page="stats"     class="nav-btn"><span class="icon">📈</span><span>Statistiques</span></button>
    <button data-page="alltime"   class="nav-btn"><span class="icon">⏳</span><span>All Time</span></button>
    <button data-page="challenges"class="nav-btn"><span class="icon">🏆</span><span>Challenges</span></button>
  </nav>
  <div id="account-selector">
    <button id="account-btn"><span class="acc-icon"></span><span class="acc-name">Aucun compte</span></button>
    <div class="dropdown" id="account-dropdown"></div>
  </div>
  <button id="add-account-btn">+ Nouveau compte</button>
</aside>

<main>
  <header>
    <h2>Tableau de bord</h2>
    <button id="logout-btn" class="btn btn-danger">Déconnexion</button>
  </header>
  <div id="banner"><span id="banner-text"></span><span class="close" id="banner-close">&times;</span></div>
  <section id="page-dashboard" class="page">
    <div class="stats-grid" id="stats-grid"></div>
    <div id="chart-container"></div>
    <div id="recent-trades" class="trade-grid"></div>
    <div id="challenge-banner" style="display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:var(--radius);margin-bottom:1.5rem;"></div>
  </section>
  <section id="page-journal" class="page">
    <div class="trade-grid" id="journal-grid"></div>
  </section>
  <section id="page-calendar" class="page">
    <table id="calendar"></table>
  </section>
  <section id="page-newtrade" class="page">
    <form id="trade-form">
      <div class="form-group"><label>Date</label><input type="date" id="trade-date" required></div>
      <div class="form-group"><label>Actif</label><select id="trade-asset" required></select></div>
      <div class="form-group"><label>Type</label><select id="trade-type"><option value="buy">Buy</option><option value="sell">Sell</option></select></div>
      <div class="form-group"><label>Taille (lots)</label><input type="number" id="trade-size" min="0.01" step="0.01" required></div>
      <div class="form-group"><label>Prix entrée</label><input type="number" id="trade-entry" step="0.01" required></div>
      <div class="form-group"><label>Prix sortie</label><input type="number" id="trade-exit" step="0.01" required></div>
      <div class="form-group"><label>P&L (auto)</label><input type="number" id="trade-pnl" step="0.01" readonly></div>
      <div class="form-group"><label>Mindset</label><select id="trade-mindset">
        <option value="focused">Focused</option>
        <option value="distracted">Distracted</option>
        <option value="revenge">Revenge</option>
        <option value="patient">Patient</option>
        <option value="greedy">Greedy</option>
        <option value="fearful">Fearful</option>
      </select></div>
      <div class="form-group"><label>Setup</label><input type="text" id="trade-setup"></div>
      <div class="form-group"><label>Notes</label><textarea id="trade-notes" rows="3"></textarea></div>
      <div class="form-group"><label>Screenshot (URL ou fichier)</label>
        <input type="text" id="trade-screenshot-url" placeholder="URL">
        ou
        <input type="file" id="trade-screenshot-file" accept="image/*">
      </div>
      <button type="submit" class="btn btn-primary">Enregistrer le trade</button>
    </form>
  </section>
  <section id="page-stats" class="page">
    <h2>Statistiques du compte actif</h2>
    <div id="stats-content"></div>
  </section>
  <section id="page-alltime" class="page">
    <h2>All Time</h2>
    <div id="alltime-content"></div>
  </section>
  <section id="page-challenges" class="page">
    <h2>Tracker Challenges</h2>
    <button id="add-challenge-btn" class="btn btn-primary mb-2">+ Nouveau Challenge</button>
    <div id="challenge-list"></div>
    <div id="challenge-history"></div>
  </section>
</main>

<div id="toast-container"></div>

<!-- Modals -->
<div class="modal-overlay" id="account-modal">
  <div class="modal">
    <span class="close-btn" id="close-account-modal">&times;</span>
    <h2 id="account-modal-title">Nouveau compte</h2>
    <form id="account-form">
      <div class="form-group"><label>Nom du compte</label><input type="text" id="acc-name" required></div>
      <div class="form-group"><label>Type</label><select id="acc-type"><option value="personal">Personal</option><option value="properfirm">Propfirm</option></select></div>
      <div class="form-group"><label>Broker</label><select id="acc-broker">
        <option value="weltrade">Weltrade</option>
        <option value="deriv">Deriv</option>
        <option value="xtb">XTB</option>
        <option value="ic_markets">IC Markets</option>
        <option value="pepperstone">Pepperstone</option>
        <option value="ftmo">FTMO</option>
        <option value="myfundedfx">MyFundedFX</option>
        <option value="custom">Custom</option>
      </select></div>
      <div class="form-group" id="broker-asset-group"><label>Actif (défaut selon broker)</label><input type="text" id="acc-asset" placeholder="ex: EURUSD"></div>
      <div class="form-group"><label>Capital de départ ($)</label><input type="number" id="acc-capital" min="0" step="0.01" value="1000"></div>
      <div class="form-group"><label>Description</label><textarea id="acc-notes" rows="2"></textarea></div>
      <div class="modal-footer">
        <button type="button" id="cancel-account-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit" class="btn btn-primary">Créer</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="challenge-modal">
  <div class="modal">
    <span class="close-btn" id="close-challenge-modal">&times;</span>
    <h2 id="challenge-modal-title">Nouveau Challenge</h2>
    <form id="challenge-form">
      <div class="form-group"><label>Propfirm</label><input type="text" id="ch-propfirm" placeholder="ex: FTMO" required></div>
      <div class="form-group"><label>Nom/Référence</label><input type="text" id="ch-name" required></div>
      <div class="form-group"><label>Capital ($)</label><input type="number" id="ch-capital" min="0" step="0.01" required></div>
      <div class="form-group"><label>Target Profit (%)</label><input type="number" id="ch-target" min="0" step="0.01" required></div>
      <div class="form-group"><label>Max Daily Drawdown (%)</label><input type="number" id="ch-md-drawdown" min="0" step="0.01" required></div>
      <div class="form-group"><label>Max Total Drawdown (%)</label><input type="number" id="ch-td-drawdown" min="0" step="0.01" required></div>
      <div class="form-group"><label>Jours minimum</label><input type="number" id="ch-min-days" min="0" step="1" required></div>
      <div class="form-group"><label>Date début</label><input type="date" id="ch-start-date" required></div>
      <div class="form-group"><label>Date fin</label><input type="date" id="ch-end-date" required></div>
      <div class="form-group"><label>Phase</label><select id="ch-phase">
        <option value="phase1">Phase 1</option>
        <option value="phase2">Phase 2</option>
        <option value="verification">Vérification</option>
        <option value="funded">Funded</option>
      </select></div>
      <div class="form-group"><label>P&L actuel ($)</label><input type="number" id="ch-pl" step="0.01" value="0"></div>
      <div class="form-group"><label>Notes</label><textarea id="ch-notes" rows="2"></textarea></div>
      <div class="modal-footer">
        <button type="button" id="cancel-challenge-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit" class="btn btn-primary">Créer</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ========== STORAGE HELPERS ========== */
const STORAGE = {
  getCurrentUser:()=>JSON.parse(localStorage.getItem('tl_current_user')||'null'),
  setCurrentUser:u=>localStorage.setItem('tl_current_user',JSON.stringify(u)),
  removeCurrentUser:()=>localStorage.removeItem('tl_current_user'),
  getSubscription:uid=>JSON.parse(localStorage.getItem(`tl_sub_${uid}`)||'null'),
  setSubscription:(uid,sub)=>localStorage.setItem(`tl_sub_${uid}`,JSON.stringify(sub)),
  getUserData:uid=>{
    const key=`tl_data_${uid}`;
    let data=localStorage.getItem(key);
    if(!data){
      data={accounts:[],challenges:[],activeAccountId:null};
      localStorage.setItem(key,JSON.stringify(data));
    }
    return JSON.parse(data);
  },
  setUserData:(uid,data)=>{localStorage.setItem(`tl_data_${uid}`,JSON.stringify(data));},
  migrateOldData:(uid)=>{
    const old=localStorage.getItem('tl3_state');
    if(!old) return false;
    try{
      const parsed=JSON.parse(old);
      const key=`tl_data_${uid}`;
      if(!localStorage.getItem(key)){
        localStorage.setItem(key,JSON.stringify(parsed));
      }
      localStorage.removeItem('tl3_state');
      showToast('✓ Données migrées avec succès','info');
      return true;
    }catch(e){console.error('Migration error',e);return false;}
  }
};

/* ========== UTILS ========== */
function showToast(message,type='info'){
  const container=document.getElementById('toast-container');
  const toast=document.createElement('div');
  toast.className=`toast ${type}`;
  const icons={info:'ℹ️',success:'✅',error:'❌'};
  toast.innerHTML=`<span>${icons[type]}</span><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(()=>toast.remove(),4000);
}
function showBanner(message,type){
  const banner=document.getElementById('banner');
  const txt=document.getElementById('banner-text');
  txt.textContent=message;
  banner.className='';
  if(type==='warning')banner.classList.add('orange');
  else if(type==='danger')banner.classList.add('red');
  banner.style.display='flex';
}
function hideBanner(){document.getElementById('banner').style.display='none';}

/* ========== AUTH & SUBSCRIPTION ========== */
function checkSession(){
  const user=STORAGE.getCurrentUser();
  if(!user||!user.id){window.location.href='index.html';return null;}
  STORAGE.migrateOldData(user.id);
  const sub=STORAGE.getSubscription(user.id);
  let valid=true,daysLeft=0,inGrace=false;
  if(!sub||!sub.expires){valid=false;}
  else{
    const exp=new Date(sub.expires);
    const now=new Date();
    const diffMs=exp-now;
    daysLeft=Math.ceil(diffMs/(1000*60*60*24));
    if(daysLeft<0){
      const graceEnd=new Date(exp.getTime()+5*24*60*60*1000);
      if(now<=graceEnd)inGrace=true;
      else valid=false;
    }
  }
  if(!valid){
    if(daysLeft<0)showBanner('⚠️ Abonnement expiré. Veuillez renouveler votre accès.','danger');
    else            showBanner('⚠️ Abonnement bientôt expiré. Renouvelez pour éviter toute interruption.','warning');
    setTimeout(()=>{window.location.href='payment.html';},3000);
    return null;
  }
  if(daysLeft<=7&&daysLeft>=0)
    showBanner(`⚠️ Votre abonnement expire dans ${daysLeft} jour(s). Renouvelez dès maintenant.`,'warning');
  if(inGrace)
    showBanner('⚠️ Vous êtes en période de grâce (5 jours après expiration). Renouvelez vite.','danger');
  return user;
}
function logout(){STORAGE.removeCurrentUser();window.location.href='index.html';}

/* ========== DATA ========== */
function getUser(){return STORAGE.getCurrentUser();}
function getUserData(){const u=getUser();return u?STORAGE.getUserData(u.id):null;}
function saveUserData(data){const u=getUser();if(u)STORAGE.setUserData(u.id,data);}

/* ========== BROKER → ASSETS ========== */
const BROKER_ASSETS={
  weltrade:['PainX','GainX','FX Vol 10','FX Vol 25','FX Vol 50','FX Vol 75','FX Vol 100','Crash 300','Crash 500','Boom 300','Boom 500'],
  deriv:['Volatility 10','Volatility 25','Volatility 50','Volatility 75','Volatility 100','Step Index','Range Break 100','Crash 300','Crash 500','Boom 300','Boom 500'],
  xtb:['EURUSD','GBPUSD','USDJPY','XAUUSD','US500','GER40'],
  ic_markets:['EURUSD','GBPUSD','XAUUSD','US30','NAS100'],
  pepperstone:['EURUSD','GBPUSD','XAUUSD','NAS100','US500'],
  ftmo:['EURUSD','GBPUSD','XAUUSD','NAS100','GER40'],
  myfundedfx:['EURUSD','GBPUSD','XAUUSD','NAS100'],
  custom:[] // free‑text entry
};
function updateAssetList(broker){
  const sel=document.getElementById('trade-asset');
  sel.innerHTML='';
  const list=BROKER_ASSETS[broker]||[];
  if(broker==='custom'){
    const opt=document.createElement('option');
    opt.value='';
    opt.textContent='(saisir manuellement)';
    sel.appendChild(opt);
  }else{
    list.forEach(a=>{
      const opt=document.createElement('option');
      opt.value=a;
      opt.textContent=a;
      sel.appendChild(opt);
    });
  }
}

/* ========== ACCOUNT LOGIC ========== */
function getActiveAccount(){
  const data=getUserData();if(!data)return null;
  const acc=data.accounts.find(a=>a.id===data.activeAccountId);
  return acc||null;
}
function renderAccountSelector(){
  const user=getUser();if(!user)return;
  const data=getUserData();

/* ========== STATS ========== */
function calcStats(trades){
  if(!trades||trades.length===0){
    return {balance:0,pnl:0,winrate:0,profitFactor:0,trades:0};
  }
  let totalPnl=0,wins=0,losses=0,profitSum=0,lossSum=0;
  trades.forEach(t=>{
    const p=Number(t.pnl||0);
    totalPnl+=p;
    if(p>0){wins++;profitSum+=p;}
    else if(p<0){losses++;lossSum+=Math.abs(p);}
  });
  const winrate=trades.length?(wins/trades.length)*100:0;
  const profitFactor=lossSum===0?Infinity:profitSum/lossSum;
  return {balance:0,pnl:totalPnl,winrate,profitFactor,trades:trades.length};
}

function updateDashboard(){
  const data=getUserData();if(!data)return;

  const balance=Number(acc.capital||0)+stats.pnl;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><h3>Capital</h3><div class="value">$${Number(acc.capital||0).toFixed(2)}</div></div>
    <div class="stat-card"><h3>Solde actuel</h3><div class="value">$${balance.toFixed(2)}</div></div>
    <div class="stat-card"><h3>P&L Total</h3><div class="value ${stats.pnl>=0?'up':'down'}$${Math.abs(stats.pnl).toFixed(2)}</div></div>

    <div class="stat-card"><h3>Profit Factor</h3><div class="value">${isFinite(stats.profitFactor)?stats.profitFactor.toFixed(2):'∞'}</div></div>
    <div class="stat-card"><h3>Trades</h3><div class="value">${stats.trades}</div></div>
  `;
  // equity chart
  const container=document.getElementById('chart-container');

  const equityData=acc.trades.map((t,i)=>{
    const x=i+1;
    const y=Number(acc.capital||0)+acc.trades.slice(0,i+1).reduce((sum,tr)=>sum+(Number(tr.pnl||0)),0);
    return {x,y};
  });
  if(window.equityChart)window.equityChart.destroy();
  window.equityChart=new Chart(ctx,{
    type:'line',
    data:{datasets:[{
      label:'Equity',
      data:equityData,
      borderColor:getComputedStyle(document.documentElement).getPropertyValue('--accent'),
      backgroundColor:getComputedStyle(document.documentElement).getPropertyValue('--accent')+'33',
      fill:false,
      tension:0.3

    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{display:false},y:{beginAtZero:false,

  });
  // recent trades
  const recent=acc.trades.slice(-5).reverse();
  const recentContainer=document.getElementById('recent-trades');
  recentContainer.innerHTML='';
  recent.forEach(t=>{

    card.className='trade-card';
    const date=new Date(t.date||t.createdAt||Date.now()).toLocaleString();
    const pnlClass=Number(t.pnl||0)>=0?'plus':'minus';
    const typeClass=t.type==='buy'?'buy':'sell';
    card.innerHTML=`
      <div class="date">${date}</div>
      <div class="asset">${t.asset||'-'}</div>
      <div class="type ${typeClass}">${t.type.toUpperCase()}</div>
      <div class="pnl ${pnlClass}">${Number(t.pnl||0).toFixed(2)} $</div>
      ${t.screenshot?`<img src="${t.screenshot}" alt="screenshot" onclick="openImage('${encodeURIComponent(t.screenshot)}')">`:''}

        <button title="Supprimer" onclick="deleteTrade('${t.id}')">🗑️</button>
      </div>
    `;
    recentContainer.appendChild(card);
  });
  // challenge banner
  const activeCh=getActiveChallenges().find(c=>c.status==='active');
  const bannerDiv=document.getElementById('challenge-banner');
  if(activeCh){
    const pct=activeCh.target&&activeCh.capital?Math.min(100,Math.max(0,(Number(activeCh.currentPL||0)/(activeCh.capital*(Number(activeCh.target||0)/100))))*100):0;
    const daysLeft=Math.ceil((new Date(activeCh.endDate)-new Date())/(1000*60*60*24));
    bannerDiv.innerHTML=`
      <span>[🏆 CHALLENGE ACTIF — ${activeCh.name} · ${pct.toFixed(0)}% du target · ${daysLeft>0?daysLeft:0} jours restants]</span>
      <div style="flex-grow:1;background:#ddd;height:4px;border-radius:2px;overflow:hidden;margin-left:1rem;">

      </div>

  }
}

/* ========== CALENDRIER ========== */
function renderCalendar(){
  const data=getUserData();if(!data){document.getElementById('calendar').innerHTML='<tr><td colspan="7">Aucun utilisateur.</td></tr>';return;}
  const acc=getActiveAccount();
  if(!acc){document.getElementById('calendar').innerHTML='<tr><td colspan="7">Aucun compte sélectionné.</td></tr>';return;}
  const table=document.getElementById('calendar');
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDay=firstDay.getDay();
  const daysInMonth=lastDay.getDate();
  const dayPnl={};
  acc.trades.forEach(t=>{
    const d=new Date(t.date||t.createdAt||0);
    if(isNaN(d.getTime()))return;
    const key=`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    dayPnl[key]=(dayPnl[key]||0)+(Number(t.pnl||0));
  });
  let html='<thead><tr>';
  ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'].forEach(d=>{html+=`<th>${d}</th>`;});
  html+='</tr></thead><tbody>';
  let rowOpened=false;
  for(let i=0;i<startDay;i++){
    if(!rowOpened){html+='<tr>';rowOpened=true;}
    html+='<td></td>';
  }
  for(let d=1;d<=daysInMonth;d++){
    if(!rowOpened){html+='<tr>';rowOpened=true;}
    const key=`${year}-${(month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
    const val=dayPnl[key]||0;
    const cls=val===0?'':val>0?'positive':'negative';
    html+=`<td class="${cls}">
      <div class="label">${d}</div>
      <div class="value">${val!==0?val.toFixed(2)+'$':''}</div>
    </td>`;
    if((startDay+d)%7===0){html+='</tr>';rowOpened=false;}
  }
  if(rowOpened){
    while((startDay+daysInMonth)%7!==0){html+='<td></td>';(startDay+daysInMonth)++;}}
  html+='</tbody>';
  table.innerHTML=html;
}

    const x=parseFloat(exit.value)||0;
    const s=parseFloat(size.value)||0;
    if(type.value==='buy')pnlInput.value=((x-e)*s).toFixed(2);
    else                  pnlInput.value=((e-x)*s).toFixed(2);
  }
  [entry,exit,size,type].forEach(el=>el.addEventListener('input',calc));
  document.getElementById('acc-broker').addEventListener('change',()=>{updateAssetList(document.getElementById('acc-broker').value);});

  `;

document.getElementById('close-challenge-modal').addEventListener('click',()=>{document.getElementById('challenge-modal').style.display='none';});
document.getElementById('challenge-form').addEventListener('submit',function(e){
  e.preventDebug;
  const user=getUser();if(!user){alert('Erreur d\'authentification');return;}
  const data=getUserData();if(!data){alert('Erreur de données');return;}
  const acc=getActiveAccount();
  if(!acc){alert('Aucun compte actif');return;}
  const ch={
    id:'ch_'+Date.now(),
    userId:user.id,
    accountId:acc.id,
    propfirm:document.getElementById('ch-propfirm').value,
    name:document.getElementById('ch-name').value,
    capital:parseFloat(document.getElementById('ch-capital').value)||0,
    target:parseFloat(document.getElementById('ch-target').value)||0,
    maxDailyDrawdown:parseFloat(document.getElementById('ch-md-drawdown').value)||0,
    maxTotalDrawdown:parseFloat(document.getElementById('ch-td-drawdown').value)||0,
    minDays:parseInt(document.getElementById('ch-min-days').value)||0,
    startDate:document.getElementById('ch-start-date').value,
    endDate:document.getElementById('ch-end-date').value,
    phase:document.getElementById('ch-phase').value,
    currentPL:parseFloat(document.getElementById('ch-pl').value)||0,
    notes:document.getElementById('ch-notes').value,
    status:'active',
    createdAt:new Date().toISOString()
  };
  data.challenges.push(ch);
  saveUserData(data);
  e.target.reset();
  document.getElementById('ch-pl').value='0';
  document.getElementById('challenge-modal').style.display='none';
  renderChallenges();
  updateDashboard();
  showToast('Challenge créé','success');
});
function openQuickPLUpdate(chId){
  const data=getUserData();if(!data)return;
  const ch=data.challenges.find(c=>c.id===chId);if(!ch){alert('Challenge introuvable');return;}
  const amount=prompt('Entrez le P&L à ajouter (peut être négatif):');
  if(amount===null)return;
  const val=parseFloat(amount);
  if(isNaN(val)){alert('Valeur invalide');return;}
  ch.currentPL=Number(ch.currentPL||0)+val;
  // auto complete/fail based on limits
  if(ch.target){
    const targetAmt=ch.capital*(ch.target/100);
    if(ch.currentPL>=targetAmt){ch.status='completed';}
  }
  if(ch.maxTotalDrawdown){
    const maxLoss=ch.capital*(ch.maxTotalDrawdown/100);
    if(ch.currentPL<=-maxLoss){ch.status='failed';}
  }
  saveUserData(data);
  renderChallenges();
  updateDashboard();
  showToast('P&L mis à jour','success');
}
function completeChallenge(chId){
  const data=getUserData();if(!data)return;
  const ch=data.challenges.find(c=>c.id===chId);if(!ch)return;
  ch.status='completed';
  saveUserData(data);
  renderChallenges();
  updateDashboard();
  showToast('Challenge marqué comme passé','success');
}
function failChallenge(chId){
  const data=getUserData();if(!data)return;
  const ch=data.challenges.find(c=>c.id===chId);if(!ch)return;
  ch.status='failed';
  saveUserData(data);
  renderChallenges();
  updateDashboard();
  showToast('Challenge marqué comme échoué','error');
}
function deleteChallenge(chId){
  if(!confirm('Supprimer ce challenge ?'))return;
  const data=getUserData();if(!data)return;
  data.challenges=data.challenges.filter(c=>c.id!==chId);
  saveUserData(data);
  renderChallenges();
  updateDashboard();
  showToast('Challenge supprimé','info');
}

/* ========== PAGE SWITCHING ========== */
function showPage(pageId){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===pageId));
}

  const user=checkSession();
  if(!user)return; // already redirected
  renderAccountSelector();
  updateDashboard();
  renderJournal();
  renderCalendar();
  renderNewTradeForm();
  renderStatsPage();
  renderAllTime();
  renderChallenges();
  showPage('dashboard');
  // Close modals with ESC
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
